<style>
  :root{--brand:#FF5B2E;--ink:#0A0A0A;--ink2:#52525B;--ink3:#A1A1AA;--line:#EAEAE5;--bg:#FAFAF7;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
  .serif{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;}

  .card{position:relative;width:100%;max-width:410px;background:#fff;border:1px solid var(--line);
    border-radius:24px;padding:28px 26px 22px;box-shadow:0 4px 12px rgba(10,10,10,.05),0 18px 50px rgba(10,10,10,.09);
    animation:rise .6s cubic-bezier(.2,.7,.2,1) both;overflow:hidden;}
  .card:before{content:"";position:absolute;top:-40%;left:50%;width:340px;height:340px;transform:translateX(-50%);
    background:radial-gradient(circle,rgba(255,91,46,.16),transparent 62%);pointer-events:none;animation:glow 4s ease-in-out infinite;}
  @keyframes rise{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
  @keyframes glow{0%,100%{opacity:.7}50%{opacity:1}}

  .top{position:relative;display:flex;align-items:center;gap:13px;}
  .check{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--brand),#FF8A5C);
    flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(255,91,46,.4);
    animation:pop .5s .15s cubic-bezier(.2,1.4,.4,1) both;}
  @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
  .check svg{width:28px;height:28px;}
  .check path{stroke:#fff;stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round;fill:none;
    stroke-dasharray:30;stroke-dashoffset:30;animation:draw .45s .5s ease forwards;}
  @keyframes draw{to{stroke-dashoffset:0}}
  .pill{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.09em;color:var(--brand);
    background:#FFE9E1;padding:4px 9px;border-radius:999px;}
  .top h1{font-size:23px;font-weight:600;letter-spacing:-0.02em;line-height:1.1;}
  .top h1 .serif{color:var(--brand);}

  .sub{position:relative;margin-top:14px;font-size:13.5px;color:var(--ink2);line-height:1.5;}

  /* Tracker */
  .track{position:relative;margin-top:20px;}
  .track .row{position:relative;display:flex;gap:13px;padding:8px 0;opacity:0;animation:slide .5s ease forwards;}
  .track .row:nth-child(1){animation-delay:.65s}
  .track .row:nth-child(2){animation-delay:.8s}
  .track .row:nth-child(3){animation-delay:.95s}
  @keyframes slide{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
  .track .line{position:absolute;left:9px;top:24px;bottom:24px;width:2px;background:linear-gradient(var(--brand),var(--line));opacity:.5;}
  .dot{position:relative;z-index:2;width:20px;height:20px;border-radius:50%;flex-shrink:0;margin-top:1px;
    display:flex;align-items:center;justify-content:center;background:#fff;border:2px solid var(--line);}
  .row.done .dot{background:var(--brand);border-color:var(--brand);}
  .row.done .dot:after{content:"";width:6px;height:6px;border-radius:50%;background:#fff;}
  .row.active .dot{border-color:var(--brand);}
  .row.active .dot:after{content:"";width:8px;height:8px;border-radius:50%;background:var(--brand);
    animation:ping 1.4s ease-out infinite;}
  @keyframes ping{0%{box-shadow:0 0 0 0 rgba(255,91,46,.5)}70%{box-shadow:0 0 0 8px rgba(255,91,46,0)}100%{box-shadow:0 0 0 0 rgba(255,91,46,0)}}
  .row b{display:block;font-size:13.5px;font-weight:600;letter-spacing:-0.01em;}
  .row span{font-size:11.5px;color:var(--ink3);}
  .row.upcoming b{color:var(--ink3);}
  .row.active b:after{content:"now";font-size:9.5px;font-weight:700;letter-spacing:.06em;color:var(--brand);
    background:#FFE9E1;padding:1px 6px;border-radius:999px;margin-left:7px;vertical-align:middle;}

  /* ETA bar */
  .eta{margin-top:6px;}
  .eta .bar{height:5px;border-radius:999px;background:var(--line);overflow:hidden;}
  .eta .bar i{display:block;height:100%;width:18%;border-radius:999px;background:linear-gradient(90deg,var(--brand),#FF8A5C);
    animation:fill 1.2s 1.1s cubic-bezier(.3,.7,.3,1) both;}
  @keyframes fill{from{width:0}to{width:18%}}
  .eta .lab{display:flex;justify-content:space-between;margin-top:8px;font-size:11.5px;color:var(--ink2);}
  .eta .lab b{color:var(--ink);font-weight:600;}

  .ref{margin-top:16px;padding-top:14px;border-top:1px dashed var(--line);display:flex;justify-content:space-between;align-items:center;}
  .ref .k{font-size:11px;color:var(--ink3);}
  .ref .v{font-family:ui-monospace,monospace;font-size:13px;font-weight:700;letter-spacing:.02em;}

  .actions{margin-top:18px;display:flex;gap:9px;}
  .actions a{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;
    padding:12px;border-radius:999px;font-size:13.5px;font-weight:600;text-decoration:none;transition:transform .15s,box-shadow .2s,background .15s;}
  .actions a:active{transform:translateY(1px);}
  .ghost{background:var(--bg);color:var(--ink);border:1px solid var(--line);}
  .ghost:hover{background:#fff;}
  .wa{background:#25D366;color:#fff;box-shadow:0 6px 18px rgba(37,211,102,.32);}
  .wa:hover{box-shadow:0 9px 24px rgba(37,211,102,.42);}
  .wa svg{width:16px;height:16px;}
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="check"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div>
      <div>
        <h1>You're in the queue.</h1>
      </div>
    </div>

    <p class="sub">We're on it! A British engineer is sorting your fixed price, real lead time, and the shop building your part.</p>

    <div class="track">
      <div class="line"></div>
      <div class="row done"><span class="dot"></span><div><b>Request received</b><span id="recv">just now</span></div></div>
      <div class="row active"><span class="dot"></span><div><b>Engineer reviewing</b><span>DFM &amp; costing</span></div></div>

        WhatsApp us

    </div>
  </div>

<script>
  // Reference number — makes it feel tracked. Matches the FG-Q style used elsewhere.
  (function(){
    var d = new Date();
    var pad = function(n){ return ('0'+n).slice(-2); };
    var rand = String(Math.floor(Math.random()*900)+100);
    document.getElementById('ref').textContent = 'FG-Q' + String(d.getFullYear()).slice(2) + pad(d.getMonth()+1) + pad(d.getDate()) + '-' + rand;
    document.getElementById('recv').textContent = 'today at ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  })();
</script>
